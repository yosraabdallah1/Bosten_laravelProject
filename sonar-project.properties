# ─── SonarCloud — Bosten Laravel E-commerce ───────────────────────


sonar.projectKey=yosraabdallah1_Bosten_laravelProject
sonar.organization=yosraabdallah1
sonar.projectName=Bosten Laravel E-commerce
sonar.projectVersion=1.0.0
sonar.sources=app,routes,database
sonar.tests=tests

# Encodage
sonar.sourceEncoding=UTF-8

# ─── Couverture PHP ────────────────────────────────────────────────
# Généré par : XDEBUG_MODE=coverage php artisan test --coverage-clover=reports/coverage.xml
sonar.php.coverage.reportPaths=reports/coverage.xml

# ─── Exclusions ────────────────────────────────────────────────────
sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  public/**,\
  storage/**,\
  bootstrap/cache/**,\
  resources/views/**,\
  resources/css/**,\
  resources/js/**,\
  database/migrations/**,\
  database/seeders/**

sonar.test.exclusions=\
  vendor/**,\
  node_modules/**

# ─── Qualité ───────────────────────────────────────────────────────
# Seuil de couverture minimum (Quality Gate)
# À configurer dans l'interface SonarCloud si nécessaire
